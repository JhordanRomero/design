        body {

        /* Kinetic Typography Animations */
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        @keyframes marquee-reverse {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0); }
        }

        .animate-marquee {
            animation: marquee 25s linear infinite;
        }
        .animate-marquee-reverse {
            animation: marquee-reverse 30s linear infinite;
        }

        /* Kinetic Text Stroke */
        .text-outline {
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.08);
            color: transparent;
        }
        .text-outline-neon {
            -webkit-text-stroke: 1px rgba(204, 255, 0, 0.15);
            color: transparent;
        }

        /* Custom Interactive Elements */
        .kinetic-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .kinetic-btn::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background-color: #ccff00;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: -1;
        }
        .kinetic-btn:hover::before {
            height: 100%;
        }
        .kinetic-btn:hover {
            color: #050505 !important;
            border-color: #ccff00;
        }
        .kinetic-btn:hover svg {
            color: #050505 !important;
        }

        /* Accordion Layout */
        .accordion-item {
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .accordion-item:hover {
            border-color: rgba(204, 255, 0, 0.5);
            background: rgba(204, 255, 0, 0.02);
        }
        
        .preview-wrapper {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .preview-wrapper.active {
            max-height: 900px;
            opacity: 1;

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; }
        ::-webkit-scrollbar-thumb:hover { background: #ccff00; }

    <script>
        lucide.createIcons();
        document.getElementById('year').textContent = new Date().getFullYear();

        function togglePreview(previewId, btnElement) {
            const previewContainer = document.getElementById(previewId);
            const chevron = btnElement.querySelector('.chevron-icon');
            const isActive = previewContainer.classList.contains('active');

            // Cerrar otros
            document.querySelectorAll('.preview-wrapper').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelectorAll('.chevron-icon').forEach(icon => {
                icon.style.transform = 'rotate(0deg)';
            });

            // Abrir seleccionado
            if (!isActive) {
                previewContainer.classList.add('active');
                // Rotación kinética del ícono
                chevron.style.transform = 'rotate(135deg)';
                
                setTimeout(() => {
                    const offset = 40;
                    const elementPosition = btnElement.getBoundingClientRect().top;
                    const offsetPosition = elementPosition + window.pageYOffset - offset;
                    
                    window.scrollTo({
                        top: offsetPosition,
                        behavior: "smooth"
                    });
                }, 300);
            }
        }
    </script>
